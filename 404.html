<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,follow" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var path = window.location.pathname || "/";
      var search = window.location.search || "";
      var hash = window.location.hash || "";

      var aliases = {
        about: "overview",
        features: "architecture",
        "llm-changelog": "llm-inference"
      };
      var sections = new Set([
        "overview", "architecture", "demo", "docs", "research", "changelog",
        "llm-inference",
        "architecture-layers", "governance-pack", "prior-art",
        "ecosystem-collaboration", "ecosystem-aegis", "cookie-policy",
        "lab", "execution-monitor", "admin"
      ]);

      var parts = path.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
      var projectBase = "";
      if (parts.length > 0 && !sections.has(parts[0])) {
        projectBase = "/" + parts[0];
      }

      var relativePath = projectBase ? path.slice(projectBase.length) : path;
      if (!relativePath.startsWith("/")) relativePath = "/" + relativePath;

      if (relativePath.indexOf("/admin/") === 0 || relativePath === "/admin") return;

      var target = null;

      if (/\.html$/i.test(relativePath)) {
        var slug = relativePath.split("/").pop().replace(/\.html$/i, "");
        slug = aliases[slug] || slug;
        target = projectBase + "/" + slug + "/";
      } else {
        var bare = relativePath.replace(/^\/+|\/+$/g, "");
        if (bare) {
          bare = aliases[bare] || bare;
          target = projectBase + "/" + bare + "/";
        }
      }

      if (target && target !== path) {
        window.location.replace(target + search + hash);
      }
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0b1f3a;
      color: #eaf3ff;
    }
    .wrap { text-align: center; padding: 24px; }
    a { color: #7fc8ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <p>Page not found.</p>
    <p><a href="./">Return to home</a></p>
  </div>
</body>
</html>
