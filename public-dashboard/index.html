<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Elora Public Dashboard Bundle Demo</title>
  <link rel="stylesheet" href="./elora-dashboard.css" />
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at 10% 0%, #f6f9ff 0%, #ecf2fa 40%, #e8eef8 100%);
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: #234264;
    }
    .demo-wrap {
      max-width: 1400px;
      margin: 20px auto;
      padding: 0 16px 24px;
    }
    .demo-head {
      margin-bottom: 14px;
    }
    .demo-head h1 {
      margin: 0;
      font-size: 20px;
      color: #5f4db7;
    }
    .demo-head p {
      margin: 6px 0 0;
      color: #5f7fa4;
      font-size: 13px;
    }
    code {
      background: #f2f7ff;
      border: 1px solid #d6e1f0;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <main class="demo-wrap">
    <header class="demo-head">
      <h1>Elora Public Dashboard JS Bundle</h1>
      <p>Standalone website package. Endpoint defaults to <code>/public/api/dashboard/telemetry-v1</code>.</p>
    </header>
    <div
      data-elora-dashboard
      data-endpoint="/public/api/dashboard/telemetry-v1"
      data-poll-ms="7000"
      data-music-src="https://ai.elorataurus.com/soundtrack/"
    ></div>
  </main>

  <script src="./elora-dashboard.js"></script>
</body>
</html>
